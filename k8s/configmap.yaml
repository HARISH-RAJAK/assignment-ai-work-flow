apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-config
  namespace: ai-task-platform
data:
  NODE_ENV: "production"
  PORT: "5000"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  MONGODB_URI: "mongodb://mongodb-service:27017/ai_task_platform"
  QUEUE_NAME: "ai-task-queue"
  LOG_LEVEL: "INFO"
  CORS_ORIGIN: "http://ai-task-platform.local"
